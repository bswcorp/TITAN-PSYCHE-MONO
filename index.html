<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><title>STG | SOVEREIGN COMMAND CENTER</title>
    <style>
        :root { --neon: #00f2ff; --gold: #ffd700; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Share Tech Mono', monospace; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { border-bottom: 2px solid var(--neon); padding: 20px; background: #000; text-align: center; }
        footer { border-top: 1px solid #333; padding: 10px; font-size: 0.7rem; text-align: center; margin-top: auto; color: #555; }
        #main-content { padding: 20px; flex: 1; overflow-y: auto; }
        .nav-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 5px 15px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <!-- 1. HEADER (ABADI) -->
    <header>
        <h1>🏛️ STG GOVERNMENT HUD</h1>
        <nav>
            <button class="nav-btn" onclick="loadContent('sirkus.html')">THE CIRCUS</button>
            <button class="nav-btn" onclick="loadContent('mars.html')">MARS RADAR</button>
            <button class="nav-btn" onclick="loadContent('psyche.html')">16 PSYCHE</button>
        </nav>
    </header>

    <!-- 2. CONTENT (DINAMIS - BERBARIS RAPI) -->
    <main id="main-content">
        <h2>PILIH MODUL KEDAULATAN DI ATAS...</h2>
    </main>

    <!-- 3. FOOTER (ABADI) -->
    <footer>
        ARCHITECT: ANDI M. HARPIANTO | PROBE ID: 19546 | WEB 5.0 INTEGRATED
    </footer>

    <script>
        function loadContent(page) {
            fetch(page)
                .then(response => response.text())
                .then(data => {
                    document.getElementById('main-content').innerHTML = data;
                })
                .catch(err => console.log('Sinyal Putus:', err));
        }
    </script>
</body>
</html>
