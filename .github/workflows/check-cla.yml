name: Check CLA for proprietary changes
on: [pull_request]
jobs:
  check-cla:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Find proprietary changes
        run: |
          git fetch origin ${{ github.base_ref }}
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '^proprietary/' || true)
          if [ -n "$CHANGED" ]; then
            if ! gh pr view ${{ github.event.pull_request.number }} --json body | grep -q "I, .* confirm .* accept the terms of the CLA"; then
              echo "Proprietary files changed but CLA sign-off not found in PR body."
              exit 1
            fi
          fi
          
